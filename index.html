    <script>
        (function () {
            var el = document.getElementById("user-location");
            if (!el) return;

            var fallback = "EM Sorocaba - SP";

            function showLocation(city, uf) {
                if (!city) {
                    el.textContent = fallback;
                    return;
                }

                el.textContent = "EM " + (uf ? city + " - " + uf : city);
            }

            function requestJson(url, ms) {
                var controller = new AbortController();
                var timeout = setTimeout(function () { controller.abort(); }, ms);

                return fetch(url, { signal: controller.signal })
                    .then(function (response) { return response.json(); })
                    .then(function (data) {
                        clearTimeout(timeout);
                        return data;
                    }, function (error) {
                        clearTimeout(timeout);
                        throw error;
                    });
            }

            requestJson("https://ipwho.is/", 4000)
                .then(function (data) {
                    if (data && data.success && data.city) {
                        showLocation(data.city, data.region_code || data.region || "");
                        return;
                    }
                    throw new Error("sem dados");
                })
                .catch(function () {
                    requestJson("https://get.geojs.io/v1/ip/geo.json", 4000)
                        .then(function (data) {
                            if (data && data.city) {
                                showLocation(data.city, data.region || "");
                                return;
                            }
                            el.textContent = fallback;
                        })
                        .catch(function () {
                            el.textContent = fallback;
                        });
                });
        })();
    </script>
